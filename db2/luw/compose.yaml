name: DB2 LUW
services:
  db2rest:
    image: icr.io/obs/hdm/db2rest:latest-amd64 # Authenticated image, requires IBM Cloud login and access to the IBM Container Registry
    container_name: db2rest
    profiles:
      - api
    ports:
      - 50050
    environment:
      LICENSE: accept
  db2:
    image: "icr.io/db2_community/db2:latest"
    container_name: db2
    environment:
      LICENSE: accept
      DB2INSTANCE: db2inst1
      DBNAME: testdb
      DB2INST1_PASSWORD: ${DB2_PASSWORD:-password}
      ARCHIVE_LOGS: "false"
      AUTOCONFIG: "false"
    privileged: true
    ports:
      - 50000